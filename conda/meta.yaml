{% set name = "bfxpm" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv
  entry_points:
    - bfxpm = bfxpm.main:app

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - typer >=0.12.5
    - rich >=13.0.0
    - pyyaml >=6.0.0
    - gitpython >=3.1.0

test:
  commands:
    - bfxpm --help

about:
  home: https://github.com/JD2112/bfxpm
  license: MIT
  license_file: LICENSE
  summary: 'BfxPM: Bioinformatician\'s Project Manager - Streamlining reproducibility and hygiene in computational biology.'
  dev_url: https://github.com/JD2112/bfxpm

extra:
  recipe-maintainers:
    - JD2112
