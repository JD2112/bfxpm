filters:
  - section-bibliographies
bibliography: references.bib
reference-section-title: References
citeproc: false

format:
  html:
    theme:
      - theme.scss
    css: custom.css
    mainfont: Caslon
    toc: true
    toc-depth: 3
    toc-title: Contents
    number-sections: true
    page-layout: full 
    cookie-consent: 
      type: express
      style: headline
      palette: dark
    crossref:
      appendix-title: "App."
      appendix-delim: ":"
    lightbox:
      match: auto
      effect: fade
      desc-position: right
      loop: false
  pdf:
    # documentclass: article
    documentclass: scrreprt
    pdf-engine: xelatex
    pdf-engine-opts: 
      - '--no-shell-escape'
      - '--halt-on-error'
    include-in-header: 
      text: |
        \usepackage{makeidx}
        \makeindex
        \usepackage{fontspec}
    include-after-body: 
      text: |
        \printindex
    thanks: "acknowledgement to open-sources"
    number-sections: true
    geometry:
      - top=30mm
      - left=20mm
      - heightrounded
    code-line-numbers: true
    #fontfamily: Caslon
    #format: PrettyPDF-pdf
    header-includes:
      - \usepackage{xcolor}
      - \usepackage{geometry}
      - \usepackage{hyperref}
      - \usepackage{fancyhdr}
      - \usepackage{graphicx}
      - \pagestyle{fancy}
      - \usepackage[export]{adjustbox}
      - \usepackage{makecell}
      - \geometry{
          a4paper,
          left=20mm,
          right=20mm,
          headheight=4cm,
          top=3.5cm,
          bottom=4cm,
          footskip=1cm
          }
      - \renewcommand{\headrulewidth}{0pt}
      # - \fancyhead[C]{Service Request Number \\ \textcolor{cyan}{CFFMHS-CS-2685}}
