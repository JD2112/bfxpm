project:
  type: book
  output-dir: docs

execute:
  cache: true

book:
  title: "Habijabi Book"
  subtitle: "Whatever comes in mind!"  
  reader-mode: true
  sharing: [twitter, facebook]
  page-navigation: true
  google-analytics: G-YG7LGLQWW9
  navbar: 
    search: true
    logo: img/cover.png
    right: 
      - icon: github
        href: https://github.com/JD2112/habijabi_book
      - icon: twitter
        href: https://twitter.com/jyotirmoy21
  page-footer: 
    left: |      
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Jyotirmoy Das. All Rights Reserved.</p>
      <p>[License](eula.qmd){.external target="_blank"} | [About](about.qmd){.external target="_blank"} </p>
    right: |
      <span class="faux-block">Made with [Quarto](https://quarto.org/)</span>
      <span class="faux-block">[View the source at {{< iconify mdi github >}} GitHub]({{< var github-url >}})</span>
    center: |
      <span class="faux-block">{{< iconify mdi key >}} [PGP public key]({{< var pgp.key >}}) &emsp; {{< iconify bi fingerprint >}} Fingerprint:</strong><br><span class="fingerprint">{{< var pgp.fingerprint >}}</span></span>
  downloads: [pdf, epub]
  sidebar: 
    style: floating
    collapse-level: 1
    search: true
    footer: <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Jyotirmoy Das. All Rights Reserved.</p>

